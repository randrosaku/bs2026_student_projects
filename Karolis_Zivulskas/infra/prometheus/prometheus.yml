global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "repops-api"
    static_configs:
      - targets: ["host.docker.internal:9091"]
    metrics_path: /metrics

  - job_name: "repops-worker"
    static_configs:
      - targets: ["host.docker.internal:9092"]
    metrics_path: /metrics

  - job_name: "celery-flower"
    static_configs:
      - targets: ["flower:5555"]
    metrics_path: /metrics

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]
