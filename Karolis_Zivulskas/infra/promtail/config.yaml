server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: repops-api
    static_configs:
      - targets:
          - localhost
        labels:
          job: repops
          service: api
          __path__: /logs/api.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            event: event
      - labels:
          level:
          logger:

  - job_name: repops-worker
    static_configs:
      - targets:
          - localhost
        labels:
          job: repops
          service: worker
          __path__: /logs/worker.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            event: event
      - labels:
          level:
          logger:
